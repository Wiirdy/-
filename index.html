<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وردي</title>

<style>
body{
  margin:0;
  background:#fff8fc;
  display:flex;
  justify-content:center;
}

.app{
  position:relative;
  width:100%;
  max-width:430px;
}

.bg{
  width:100%;
  display:block;
}

.tap{
  position:absolute;
  border:0;
  background:transparent;
  cursor:pointer;
}

#counter{
  position:absolute;
  top:32.5%;
  left:50%;
  transform:translateX(-50%);
  font-size:72px;
  font-weight:bold;
  color:#ff9bd6;
  text-shadow:0 0 8px #ffd6ef;
  pointer-events:none;
}

.main{top:49%; left:8%; width:84%; height:9%;}
.stats{bottom:2%; left:3%; width:25%; height:8%;}
.reset{bottom:2%; right:3%; width:25%; height:8%;}

.petal{
  position:fixed;
  width:14px;
  height:20px;
  background:#ffd0eb;
  border-radius:70% 30% 70% 30%;
  pointer-events:none;
  animation:fly 1.1s ease-out forwards;
}

@keyframes fly{
  from{opacity:1;transform:translate(0,0) rotate(0)}
  to{opacity:0;transform:translate(var(--x),-110px) rotate(90deg)}
}
</style>
</head>

<body>

<div class="app">
  <img class="bg" src="wirdi-bg.png" alt="وردي">

  <div id="counter">0</div>

  <button class="tap main" onclick="addDhikr(event)"></button>
  <button class="tap stats" onclick="showStats()"></button>
  <button class="tap reset" onclick="resetCounter()"></button>
</div>

<script>
let count = Number(localStorage.getItem("wirdiCount")) || 0;
let total = Number(localStorage.getItem("wirdiTotal")) || 0;

const counter = document.getElementById("counter");
updateUI();

function addDhikr(e){
  if(count < 1000){
    count++;
    total++;
    localStorage.setItem("wirdiCount", count);
    localStorage.setItem("wirdiTotal", total);
    updateUI();
    makePetals(e);

    if(navigator.vibrate){
      navigator.vibrate(15);
    }
  }
}

function updateUI(){
  counter.innerText = count;
}

function resetCounter(){
  count = 0;
  localStorage.setItem("wirdiCount", count);
  updateUI();
}

function showStats(){
  alert("إجمالي أذكارك: " + total + "\nورد اليوم: " + count + " / 1000");
}

function makePetals(e){
  for(let i=0;i<6;i++){
    const p = document.createElement("span");
    p.className = "petal";
    p.style.left = e.clientX + "px";
    p.style.top = e.clientY + "px";
    p.style.setProperty("--x",(Math.random()*120-60)+"px");
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1100);
  }
}
</script>

</body>
</html>
