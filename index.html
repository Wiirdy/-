<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>وردي</title>

<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#ef6f9f;
  --pink2:#ffb6ce;
  --soft:#fff6f9;
  --text:#6b4a4f;
  --line:#f8d6e2;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:'Amiri', serif;
  color:var(--text);
  background:
    radial-gradient(circle at 10% 20%, #fff 0 12%, transparent 30%),
    linear-gradient(135deg,#ffe1ec,#fff8fb 45%,#ffd3e5);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:28px;
}
.app{
  width:min(470px,100%);
  background:rgba(255,255,255,.72);
  border:1px solid white;
  border-radius:38px;
  padding:28px 22px 20px;
  box-shadow:0 25px 70px rgba(226,94,139,.25);
  position:relative;
  overflow:hidden;
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.icon{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.8);
  display:grid;place-items:center;
  box-shadow:0 8px 22px rgba(226,94,139,.14);
  color:var(--pink);
  font-size:23px;
}
.logo{
  text-align:center;
}
.logoMark{
  width:74px;height:74px;
  border:2px solid var(--pink);
  border-radius:50%;
  margin:auto;
  display:grid;place-items:center;
  font-family:Georgia,serif;
  font-size:44px;
  color:var(--pink);
  background:rgba(255,255,255,.45);
}
h1{
  font-family:'Aref Ruqaa', serif;
  font-size:58px;
  margin:10px 0 0;
  color:var(--pink);
  text-shadow:0 8px 25px rgba(239,111,159,.25);
}
.sub{
  font-size:20px;
  margin-top:2px;
}
.ring{
  --p:0deg;
  width:245px;height:245px;
  border-radius:50%;
  margin:28px auto 18px;
  background:conic-gradient(var(--pink) var(--p), #ffe7ef 0);
  padding:12px;
  box-shadow:0 0 35px rgba(239,111,159,.18);
}
.ringInner{
  width:100%;height:100%;
  border-radius:50%;
  background:rgba(255,255,255,.9);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.label{font-size:18px}
.count{
  font-family:Georgia,serif;
  font-size:72px;
  color:var(--pink);
  line-height:1;
}
.goal{font-size:20px}
.mainBtn{
  width:100%;
  border:0;
  border-radius:999px;
  padding:18px;
  color:white;
  font-family:'Aref Ruqaa', serif;
  font-size:27px;
  background:linear-gradient(135deg,#ff9abe,#e9568c);
  box-shadow:0 18px 35px rgba(239,111,159,.35);
  cursor:pointer;
  margin-top:10px;
  position:relative;
  overflow:hidden;
}
.mainBtn:active{transform:scale(.98)}
.note{
  text-align:center;
  margin:14px 0 20px;
  font-size:17px;
}
.title{
  text-align:center;
  font-family:'Aref Ruqaa', serif;
  font-size:24px;
  margin-bottom:13px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.dhikr{
  border:1px solid #fff;
  background:rgba(255,255,255,.7);
  border-radius:21px;
  padding:14px 8px;
  font-family:'Amiri', serif;
  font-size:18px;
  color:var(--text);
  box-shadow:0 8px 20px rgba(226,94,139,.09);
  cursor:pointer;
}
.dhikr.active{
  background:#fff0f6;
  color:var(--pink);
  border-color:var(--line);
}
.stats{
  margin-top:17px;
  display:flex;
  background:rgba(255,255,255,.58);
  border:1px solid white;
  border-radius:26px;
  overflow:hidden;
}
.stat{
  flex:1;
  text-align:center;
  padding:18px 8px;
}
.stat:first-child{border-left:1px solid var(--line)}
.num{
  color:var(--pink);
  font-family:Georgia,serif;
  font-size:30px;
}
.reset{
  width:100%;
  margin-top:15px;
  border:1px solid var(--line);
  border-radius:999px;
  padding:13px;
  background:rgba(255,255,255,.55);
  color:#b25773;
  font-family:'Amiri', serif;
  font-size:18px;
  cursor:pointer;
}
.ayah{
  text-align:center;
  margin-top:18px;
  font-size:18px;
  color:#9a6570;
}
.petal{
  position:absolute;
  pointer-events:none;
  font-size:22px;
  animation:float 1.2s ease-out forwards;
}
@keyframes float{
  0%{opacity:1;transform:translate(0,0) scale(.7) rotate(0)}
  100%{opacity:0;transform:translate(var(--x),-120px) scale(1.4) rotate(35deg)}
}
</style>
</head>

<body>
<div class="app">
  <div class="top">
    <div class="icon">☼</div>
    <div class="logo">
      <div class="logoMark">W</div>
      <h1>وردي</h1>
      <div class="sub">وردك اليومي إلى 1000</div>
    </div>
    <div class="icon">☾</div>
  </div>

  <div class="ring" id="ring">
    <div class="ringInner">
      <div class="label">العدد</div>
      <div class="count" id="count">0</div>
      <div class="goal">من 1000</div>
      <div>♥</div>
    </div>
  </div>

  <button class="mainBtn" id="mainBtn" onclick="addDhikr(event)">سبحان الله</button>

  <div class="note">✦ كل تسبيحة تزرع لك نورًا في قلبك ✦</div>

  <div class="title">اختر ذكرك</div>

  <div class="grid">
    <button class="dhikr active" onclick="chooseDhikr(this)">سبحان الله</button>
    <button class="dhikr" onclick="chooseDhikr(this)">الحمد لله</button>
    <button class="dhikr" onclick="chooseDhikr(this)">لا إله إلا الله</button>
    <button class="dhikr" onclick="chooseDhikr(this)">الله أكبر</button>
    <button class="dhikr" onclick="chooseDhikr(this)">استغفر الله</button>
    <button class="dhikr" onclick="chooseDhikr(this)">اللهم صل وسلم على نبينا محمد</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div>إجمالي الأذكار</div>
      <div class="num" id="total">0</div>
      <div>تسبيحة</div>
    </div>
    <div class="stat">
      <div>الهدف اليومي</div>
      <div class="num">1000</div>
      <div>تسبيحة</div>
    </div>
  </div>

  <button class="reset" onclick="resetCounter()">إعادة التصفير ↻</button>

  <div class="ayah">﴿فاذكروني أذكركم واشكروا لي ولا تكفرون﴾ ♥</div>
</div>

<script>
let count = Number(localStorage.getItem("wirdiCount")) || 0;
let total = Number(localStorage.getItem("wirdiTotal")) || 0;
let currentDhikr = localStorage.getItem("currentDhikr") || "سبحان الله";

const countEl = document.getElementById("count");
const totalEl = document.getElementById("total");
const ring = document.getElementById("ring");
const mainBtn = document.getElementById("mainBtn");

mainBtn.innerText = currentDhikr;
updateUI();

function addDhikr(e){
  if(count < 1000){
    count++;
    total++;
    localStorage.setItem("wirdiCount", count);
    localStorage.setItem("wirdiTotal", total);
    updateUI();
    makePetals(e);
  }
  if(count === 1000){
    mainBtn.innerText = "اكتمل وردك اليومي 🌸";
  }
}

function updateUI(){
  countEl.innerText = count;
  totalEl.innerText = total.toLocaleString();
  let deg = Math.min(count / 1000 * 360, 360);
  ring.style.setProperty("--p", deg + "deg");
}

function resetCounter(){
  count = 0;
  localStorage.setItem("wirdiCount", 0);
  mainBtn.innerText = currentDhikr;
  updateUI();
}

function chooseDhikr(btn){
  document.querySelectorAll(".dhikr").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentDhikr = btn.innerText;
  localStorage.setItem("currentDhikr", currentDhikr);
  mainBtn.innerText = currentDhikr;
}

function makePetals(e){
  const symbols = ["🌸","🌷","♡","✦"];
  for(let i=0;i<8;i++){
    const petal = document.createElement("span");
    petal.className = "petal";
    petal.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    petal.style.left = e.clientX + "px";
    petal.style.top = e.clientY + "px";
    petal.style.setProperty("--x", (Math.random()*120-60) + "px");
    document.body.appendChild(petal);
    setTimeout(()=>petal.remove(),1200);
  }
}
</script>
</body>
</html>
