<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وردي</title>

<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#F47DAA;
  --deep:#D85A8D;
  --light:#FFE3EE;
  --bg:#FFF8FB;
  --text:#7A5A61;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:26px;
  font-family:'Amiri', serif;
  color:var(--text);
  background:
    radial-gradient(circle at top,#fff 0%,#fff8fb 35%,#ffe3ee 100%);
}

.card{
  width:min(520px,100%);
  background:rgba(255,255,255,.78);
  border-radius:42px;
  padding:34px 28px 28px;
  text-align:center;
  box-shadow:0 30px 80px rgba(216,90,141,.22);
  position:relative;
  overflow:hidden;
}

.themeBtn{
  position:absolute;
  top:34px;
  left:34px;
  width:48px;
  height:48px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,.8);
  color:var(--pink);
  font-size:22px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(216,90,141,.12);
}

.logo{
  width:92px;
  height:92px;
  margin:4px auto 14px;
  position:relative;
}

.bead{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--pink);
  opacity:.75;
  left:50%;
  top:50%;
  transform:
    rotate(calc(var(--i) * 24deg))
    translateY(-38px);
}

.logoHeart{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  color:var(--deep);
  font-size:20px;
}

h1{
  font-family:'Aref Ruqaa', serif;
  font-size:60px;
  line-height:1.1;
  color:var(--deep);
  margin:0;
  text-shadow:0 12px 28px rgba(244,125,170,.18);
}

.subtitle{
  font-size:21px;
  margin-top:7px;
}

.ring{
  --p:0deg;
  width:268px;
  height:268px;
  margin:34px auto 24px;
  border-radius:50%;
  padding:13px;
  background:conic-gradient(var(--pink) var(--p), #ffe9f1 0);
  box-shadow:0 0 45px rgba(244,125,170,.18);
}

.ringInner{
  width:100%;
  height:100%;
  border-radius:50%;
  background:rgba(255,255,255,.94);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.label{
  font-size:22px;
}

.count{
  font-family:Georgia, serif;
  font-size:82px;
  color:var(--deep);
  line-height:1;
}

.goal{
  font-size:21px;
}

.mainBtn{
  width:100%;
  border:0;
  border-radius:999px;
  padding:19px;
  font-family:'Aref Ruqaa', serif;
  font-size:29px;
  color:white;
  background:linear-gradient(135deg,#ff9cc2,var(--deep));
  box-shadow:0 18px 40px rgba(216,90,141,.34);
  cursor:pointer;
}

.mainBtn:active{
  transform:scale(.98);
}

.dua{
  margin:20px 0 22px;
  font-size:20px;
  color:#946872;
}

.dhikrGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:11px;
  margin-bottom:16px;
}

.dhikrBtn{
  border:1px solid #f8cdda;
  background:rgba(255,255,255,.68);
  color:var(--text);
  border-radius:20px;
  padding:13px 8px;
  font-family:'Amiri', serif;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(216,90,141,.08);
}

.dhikrBtn.active{
  background:#fff0f6;
  color:var(--deep);
  border-color:#f4a7c4;
}

.reset{
  width:100%;
  border:1px solid #f5cbd9;
  background:rgba(255,255,255,.6);
  color:#a26470;
  border-radius:999px;
  padding:15px;
  font-family:'Aref Ruqaa', serif;
  font-size:22px;
  cursor:pointer;
}

.complete{
  display:none;
  margin-top:18px;
  padding:18px;
  border-radius:26px;
  background:rgba(255,240,246,.9);
  color:var(--deep);
  font-family:'Aref Ruqaa', serif;
  font-size:24px;
}

.petal{
  position:fixed;
  width:12px;
  height:18px;
  background:var(--light);
  border-radius:12px 12px 12px 2px;
  pointer-events:none;
  animation:float 1.2s ease-out forwards;
  z-index:999;
}

@keyframes float{
  0%{opacity:1; transform:translate(0,0) scale(.7) rotate(0deg)}
  100%{opacity:0; transform:translate(var(--x),-110px) scale(1.25) rotate(80deg)}
}

.dark{
  --bg:#2D2430;
  --text:#F7DCE7;
  --light:#6B4659;
  background:
    radial-gradient(circle at top,#473247 0%,#2d2430 70%);
}

.dark .card{
  background:rgba(54,42,58,.82);
  box-shadow:0 30px 80px rgba(0,0,0,.25);
}

.dark .ringInner,
.dark .dhikrBtn,
.dark .reset,
.dark .themeBtn{
  background:rgba(255,255,255,.08);
}

.dark .subtitle,
.dark .dua,
.dark .label,
.dark .goal{
  color:#f7dce7;
}
</style>
</head>

<body>

<div class="card">
  <button class="themeBtn" onclick="toggleTheme()" id="themeBtn">🌙</button>

  <div class="logo">
    <span class="bead" style="--i:0"></span>
    <span class="bead" style="--i:1"></span>
    <span class="bead" style="--i:2"></span>
    <span class="bead" style="--i:3"></span>
    <span class="bead" style="--i:4"></span>
    <span class="bead" style="--i:5"></span>
    <span class="bead" style="--i:6"></span>
    <span class="bead" style="--i:7"></span>
    <span class="bead" style="--i:8"></span>
    <span class="bead" style="--i:9"></span>
    <span class="bead" style="--i:10"></span>
    <span class="bead" style="--i:11"></span>
    <span class="bead" style="--i:12"></span>
    <span class="bead" style="--i:13"></span>
    <span class="bead" style="--i:14"></span>
    <div class="logoHeart">♥</div>
  </div>

  <h1>وردي</h1>
  <div class="subtitle">وردك اليومي إلى 1000</div>

  <div class="ring" id="ring">
    <div class="ringInner">
      <div class="label">العدد</div>
      <div class="count" id="count">0</div>
      <div class="goal">من 1000</div>
    </div>
  </div>

  <button class="mainBtn" onclick="addDhikr(event)" id="mainBtn">سبحان الله</button>

  <div class="dua">🤍 اللهم اجعل هذا اليوم مليئًا بذكرك ورضاك</div>

  <div class="dhikrGrid">
    <button class="dhikrBtn active" onclick="chooseDhikr(this)">سبحان الله</button>
    <button class="dhikrBtn" onclick="chooseDhikr(this)">الحمد لله</button>
    <button class="dhikrBtn" onclick="chooseDhikr(this)">لا إله إلا الله</button>
    <button class="dhikrBtn" onclick="chooseDhikr(this)">الله أكبر</button>
    <button class="dhikrBtn" onclick="chooseDhikr(this)">أستغفر الله</button>
    <button class="dhikrBtn" onclick="chooseDhikr(this)">اللهم صل وسلم على نبينا محمد ﷺ</button>
  </div>

  <button class="reset" onclick="resetCounter()">إعادة التصفير ↻</button>

  <div class="complete" id="completeBox">
    🌷<br>
    ما شاء الله<br>
    اكتمل وردك اليومي<br>
    1000 / 1000
  </div>
</div>

<script>
let count = Number(localStorage.getItem("wirdiCount")) || 0;
let currentDhikr = localStorage.getItem("wirdiDhikr") || "سبحان الله";
let theme = localStorage.getItem("wirdiTheme") || "light";

const countEl = document.getElementById("count");
const ring = document.getElementById("ring");
const mainBtn = document.getElementById("mainBtn");
const completeBox = document.getElementById("completeBox");
const themeBtn = document.getElementById("themeBtn");

mainBtn.innerText = currentDhikr;
applyTheme();
updateUI();

function addDhikr(e){
  if(count < 1000){
    count++;
    localStorage.setItem("wirdiCount", count);
    updateUI();
    makePetals(e);
  }

  if(count === 1000){
    completeBox.style.display = "block";
  }
}

function resetCounter(){
  count = 0;
  localStorage.setItem("wirdiCount", count);
  completeBox.style.display = "none";
  updateUI();
}

function chooseDhikr(btn){
  document.querySelectorAll(".dhikrBtn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentDhikr = btn.innerText;
  localStorage.setItem("wirdiDhikr", currentDhikr);
  mainBtn.innerText = currentDhikr;
}

function updateUI(){
  countEl.innerText = count;
  let deg = Math.min(count / 1000 * 360, 360);
  ring.style.setProperty("--p", deg + "deg");
  completeBox.style.display = count >= 1000 ? "block" : "none";
}

function toggleTheme(){
  theme = theme === "light" ? "dark" : "light";
  localStorage.setItem("wirdiTheme", theme);
  applyTheme();
}

function applyTheme(){
  document.body.classList.toggle("dark", theme === "dark");
  themeBtn.innerText = theme === "dark" ? "☀️" : "🌙";
}

function makePetals(e){
  for(let i=0;i<6;i++){
    const petal = document.createElement("span");
    petal.className = "petal";
    petal.style.left = e.clientX + "px";
    petal.style.top = e.clientY + "px";
    petal.style.setProperty("--x", (Math.random()*130-65) + "px");
    petal.style.transform = `rotate(${Math.random()*160}deg)`;
    document.body.appendChild(petal);
    setTimeout(()=>petal.remove(),1200);
  }
}
</script>

</body>
</html>
